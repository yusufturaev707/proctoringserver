{% extends "admin/change_list.html" %}

        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        background: #1565C0;
        color: #fff;
        border-radius: 8px;
        text-decoration: none;
        font-size: 13px;

    {{ block.super }}
